name: synthesis

# Weekly consolidation pass. The hourly curator captures facts; this job looks
# for repeated patterns across recent notes and writes short synthesis pages so
# the wiki stays Wikipedia-like instead of becoming only timestamped history.

on:
  schedule:
    - cron: '53 5 * * 0'   # Sundays 05:53 UTC
  workflow_dispatch:

concurrency:
  group: memory-repo-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  synthesize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/d6o/dip.ink/pi-runner:v0.1.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run synthesis pass
        shell: bash
        env:
          PROMPT_PATH: .pi/prompts/synthesis-auto.md
          PI_PROVIDER: ${{ vars.PI_PROVIDER || 'openai' }}
          PI_MODEL: ${{ vars.PI_MODEL || 'gpt-4.1-mini' }}
          PI_THINKING: medium
          PI_API_KEY: ${{ secrets.PI_API_KEY }}
          PI_MODELS_JSON: ${{ vars.PI_MODELS_JSON || '' }}
          WIKI_REPO_TOKEN: x-access-token:${{ secrets.GITHUB_TOKEN }}
          COMMIT_MESSAGE: "update(auto): synthesis pass"
          GIT_USER_NAME: "wiki-synthesis-bot"
          GIT_USER_EMAIL: "curator@users.noreply.github.com"
          VALIDATOR: "python3 scripts/wikilint.py"
        run: /opt/pi-runner/entrypoint.sh
