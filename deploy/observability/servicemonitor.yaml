apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dipink-memory
  namespace: dipink
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - dipink
  selector:
    matchLabels:
      app: memory
  endpoints:
    - port: http
      path: /metrics
      scheme: http
      interval: 30s
      scrapeTimeout: 10s
