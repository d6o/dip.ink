# Copy to secrets.yaml, fill in, `kubectl apply -f` — or manage these with
# your secret operator of choice (ExternalSecrets, Infisical, SealedSecrets...).
# NEVER commit the filled-in copy.
apiVersion: v1
kind: Secret
metadata:
  name: dipink-secrets
  namespace: dipink
type: Opaque
stringData:
  # Neo4j: the docker image expects NEO4J_AUTH as the literal "user/password".
  NEO4J_AUTH: neo4j/change-me
  NEO4J_PASSWORD: change-me
  # OpenAI (embeddings + default extraction/distiller LLM).
  OPENAI_API_KEY: sk-...
  # Optional OpenAI-compatible extraction endpoint (leave empty for OpenAI).
  LLM_BASE_URL: ""
  LLM_API_KEY: ""
  # Optional independent graph_answer distiller endpoint/key. Empty values
  # inherit the extraction endpoint/key.
  DISTILL_BASE_URL: ""
  DISTILL_API_KEY: ""
  # Private wiki repo (HTTPS) + a read/write token.
  WIKI_REPO_URL: https://github.com/you/my-memory.git
  WIKI_REPO_USER: token
  WIKI_REPO_TOKEN: ghp_...
