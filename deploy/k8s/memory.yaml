---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memory-data
  namespace: dipink
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory
  namespace: dipink
spec:
  replicas: 1
  strategy:
    type: Recreate   # RWO PVC (clone + embedding cache + metrics) -> Recreate
  selector:
    matchLabels:
      app: memory
  template:
    metadata:
      labels:
        app: memory
    spec:
      containers:
        - name: memory
          image: ghcr.io/d6o/dip.ink/memory:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            # wiki side
            - name: WIKI_REPO_URL
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: WIKI_REPO_URL}}
            - name: WIKI_REPO_USER
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: WIKI_REPO_USER}}
            - name: WIKI_REPO_TOKEN
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: WIKI_REPO_TOKEN}}
            - {name: CACHE_DIR, value: /var/lib/memory/cache}
            - {name: WIKI_CLONE_PATH, value: /var/lib/memory/wiki}
            # Add your ingress hostname here (DNS-rebinding protection).
            - name: MCP_ALLOWED_HOSTS
              value: "localhost,127.0.0.1,memory,memory.dipink.svc.cluster.local"
            # graph side
            - {name: NEO4J_URI, value: bolt://neo4j:7687}
            - {name: NEO4J_USER, value: neo4j}
            - name: NEO4J_PASSWORD
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: NEO4J_PASSWORD}}
            - name: OPENAI_API_KEY
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: OPENAI_API_KEY}}
            - name: LLM_BASE_URL
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: LLM_BASE_URL}}
            - name: LLM_API_KEY
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: LLM_API_KEY}}
            - {name: LLM_MODEL, value: gpt-4.1-mini}
            - {name: GROUP_ID, value: main}
          volumeMounts:
            - name: data
              mountPath: /var/lib/memory
          resources:
            requests: {cpu: "200m", memory: 512Mi}
            limits: {cpu: "1", memory: 1.5Gi}
          livenessProbe:
            httpGet: {path: /live, port: 8080}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: {path: /health, port: 8080}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: memory-data
---
apiVersion: v1
kind: Service
metadata:
  name: memory
  namespace: dipink
spec:
  selector:
    app: memory
  ports:
    - name: http
      port: 80
      targetPort: 8080
