---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memory-data
  namespace: dipink
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory
  namespace: dipink
spec:
  replicas: 1
  strategy:
    type: Recreate   # RWO PVC (clone + embedding cache + metrics) -> Recreate
  selector:
    matchLabels:
      app: memory
  template:
    metadata:
      labels:
        app: memory
    spec:
      containers:
        - name: memory
          image: ghcr.io/d6o/dip.ink/memory:v0.1.2
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: dipink-config
          env:
            # Wiki repository credentials. Non-secret defaults live in the
            # shared ConfigMap so the server and maintenance jobs stay aligned.
            - name: WIKI_REPO_URL
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: WIKI_REPO_URL}}
            - name: WIKI_REPO_USER
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: WIKI_REPO_USER}}
            - name: WIKI_REPO_TOKEN
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: WIKI_REPO_TOKEN}}
            - {name: CACHE_DIR, value: /var/lib/memory/cache}
            - {name: WIKI_CLONE_PATH, value: /var/lib/memory/wiki}
            # Graph/extraction credentials. Custom provider and distiller keys
            # are optional; empty/missing values fall back in server code.
            - {name: NEO4J_URI, value: bolt://neo4j:7687}
            - {name: NEO4J_USER, value: neo4j}
            - name: NEO4J_PASSWORD
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: NEO4J_PASSWORD}}
            - name: OPENAI_API_KEY
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: OPENAI_API_KEY}}
            - name: LLM_BASE_URL
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: LLM_BASE_URL, optional: true}}
            - name: LLM_API_KEY
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: LLM_API_KEY, optional: true}}
            - name: DISTILL_BASE_URL
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: DISTILL_BASE_URL, optional: true}}
            - name: DISTILL_API_KEY
              valueFrom: {secretKeyRef: {name: dipink-secrets, key: DISTILL_API_KEY, optional: true}}
          volumeMounts:
            - name: data
              mountPath: /var/lib/memory
          resources:
            requests: {cpu: "200m", memory: 512Mi}
            limits: {cpu: "1", memory: 1.5Gi}
          livenessProbe:
            httpGet: {path: /live, port: 8080}
            initialDelaySeconds: 10
            periodSeconds: 15
            # Tolerate transient event-loop stalls: with the default 1s timeout
            # and 3 failures, a ~45s stall gets the pod killed (seen 2026-07-17
            # when a git op ran on the event loop). Kill only after ~90s.
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet: {path: /health, port: 8080}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: memory-data
---
apiVersion: v1
kind: Service
metadata:
  name: memory
  namespace: dipink
  labels:
    app: memory
spec:
  selector:
    app: memory
  ports:
    - name: http
      port: 80
      targetPort: 8080
