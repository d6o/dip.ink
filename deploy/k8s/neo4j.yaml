---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data
  namespace: dipink
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: dipink
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      # The neo4j image treats every NEO4J_* env var as a config setting;
      # service links would inject NEO4J_PORT_* and break strict validation.
      enableServiceLinks: false
      containers:
        - name: neo4j
          image: neo4j:5.26.2
          ports:
            - name: bolt
              containerPort: 7687
            - name: http
              containerPort: 7474
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: dipink-secrets
                  key: NEO4J_AUTH
            - name: NEO4J_server_memory_heap_initial__size
              value: "1g"
            - name: NEO4J_server_memory_heap_max__size
              value: "1g"
            - name: NEO4J_server_memory_pagecache_size
              value: "512m"
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          startupProbe:
            httpGet:
              path: /
              port: 7474
            periodSeconds: 10
            failureThreshold: 30   # 5 min slack
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: neo4j-data
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: dipink
spec:
  selector:
    app: neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474
