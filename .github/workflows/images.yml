name: images

# Builds and publishes the three container images to GHCR:
#   ghcr.io/<owner>/dip.ink/wiki-mcp
#   ghcr.io/<owner>/dip.ink/graphiti
#   ghcr.io/<owner>/dip.ink/pi-runner
# Users of the docker-compose path build locally instead; these images are for
# the k8s path and the curator CI workflows in template/.github/workflows/.

on:
  push:
    branches: [main]
    paths:
      - 'wiki-mcp/**'
      - 'graphiti/**'
      - 'curator/pi-runner/**'
      - '.github/workflows/images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: wiki-mcp
            context: ./wiki-mcp
          - name: graphiti
            context: ./graphiti
          - name: pi-runner
            context: ./curator/pi-runner
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.name }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
