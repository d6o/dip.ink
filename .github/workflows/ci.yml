name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  server-unit:
    name: server unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt
      - name: Install server dependencies
        run: python -m pip install -r server/requirements.txt
      - name: Run unit suite
        working-directory: server
        env:
          OPENAI_API_KEY: test-only
          WIKI_MCP_BACKGROUND_REINDEX: "0"
          WIKI_MCP_EMBED_PROVIDER: openai
          WIKI_ROOT: /tmp/dipink-ci-wiki
          # Keep the real Neo4j suite skipped here; the dedicated job owns it.
          NEO4J_INTEGRATION: "0"
        run: python -m unittest discover -s tests -p 'test_*.py' -v

  server-neo4j-integration:
    name: Neo4j 5.26.2 integration
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      neo4j:
        image: neo4j:5.26.2
        env:
          NEO4J_AUTH: neo4j/ci-neo4j-password
          NEO4J_server_memory_heap_initial__size: 256m
          NEO4J_server_memory_heap_max__size: 512m
          NEO4J_server_memory_pagecache_size: 256m
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 >/dev/null || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 18
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt
      - name: Install server dependencies
        run: python -m pip install -r server/requirements.txt
      - name: Run real Neo4j integration suite
        env:
          OPENAI_API_KEY: test-only
          WIKI_MCP_BACKGROUND_REINDEX: "0"
          WIKI_MCP_EMBED_PROVIDER: openai
          WIKI_ROOT: /tmp/dipink-ci-wiki
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ci-neo4j-password
          GROUP_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}
          # Lane A opt-in flag (authoritative). Aliases kept for compatibility.
          NEO4J_INTEGRATION: "1"
          RUN_NEO4J_INTEGRATION: "1"
          DIPINK_RUN_NEO4J_INTEGRATION: "1"
        run: bash ci/run-neo4j-integration.sh

  curator-template:
    name: curator and template validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependency
        run: python -m pip install 'PyYAML>=6.0,<7'
      - name: Run curator supervisor shell tests
        run: bash curator/scripts/test-processnotes-supervisor.sh
      - name: Validate a fresh template repository
        shell: bash
        run: |
          set -euo pipefail
          target="$RUNNER_TEMP/template-repo"
          mkdir -p "$target"
          cp -a template/. "$target/"
          cd "$target"
          python3 "$GITHUB_WORKSPACE/curator/scripts/wikilint.py"
          python3 "$GITHUB_WORKSPACE/curator/scripts/wikiindex.py" --check
      - name: Check template workflow and bootstrap contracts
        run: python ci/check-repo-contract.py --template

  manifests-workflows:
    name: workflows, compose, and Kubernetes manifests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0
      - name: Install YAML parser
        run: python -m pip install 'PyYAML>=6.0,<7'
      - name: Parse all owned and generated YAML inputs
        run: python ci/check-yaml.py
      - name: Lint GitHub Actions workflows
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          -w /repo
          rhysd/actionlint:1.7.7
      - name: Validate release and path contracts
        run: python ci/check-repo-contract.py --release
      - name: Render Docker Compose with fixture environment
        run: docker compose --env-file ci/compose.env config --quiet
      - name: Render and inspect Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize deploy/k8s > "$RUNNER_TEMP/dipink-k8s.yaml"
          python ci/check-k8s.py "$RUNNER_TEMP/dipink-k8s.yaml" deploy/observability

          cp "$RUNNER_TEMP/dipink-k8s.yaml" "$RUNNER_TEMP/all-manifests.yaml"
          while IFS= read -r manifest; do
            printf '\n---\n' >> "$RUNNER_TEMP/all-manifests.yaml"
            cat "$manifest" >> "$RUNNER_TEMP/all-manifests.yaml"
          done < <(find deploy/observability -maxdepth 1 -type f \
            \( -name '*.yaml' -o -name '*.yml' \) | sort)
      - name: Kubernetes schema smoke
        run: >-
          docker run --rm
          -v "$RUNNER_TEMP:/work:ro"
          ghcr.io/yannh/kubeconform:v0.6.7
          -strict
          -summary
          -ignore-missing-schemas
          /work/all-manifests.yaml

  pi-extension-typecheck:
    name: Pi extension TypeScript typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ci/pi/package-lock.json
      - name: Install pinned typecheck toolchain
        run: npm ci --prefix ci/pi --ignore-scripts
      - name: Typecheck the memory Pi extension
        run: ./ci/pi/node_modules/.bin/tsc -p ci/pi/tsconfig.json

  docker-build:
    name: Docker build (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: memory
            context: ./server
            dockerfile: ./server/Dockerfile
          - name: pi-runner
            context: ./curator
            dockerfile: ./curator/pi-runner/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: dipink/${{ matrix.name }}:ci
          cache-from: type=gha,scope=ci-${{ matrix.name }}
          cache-to: type=gha,scope=ci-${{ matrix.name }},mode=max
